---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - from-file: common.yaml
  - type: files
    files:
      - source: workstation
        destination: /
  # Install build dependencies for wezterm (including rust toolchain and rpmbuild) (from https://github.com/wezterm/wezterm/blob/8afe0ad30739c5aa106c19e8a75b1dfc83bcfb56/get-deps)
  - type: dnf
    install:
      packages:
        - make
        - gcc
        - gcc-c++
        - flatpak-builder
        - fontconfig-devel
        - openssl-devel
        - openssl-devel-engine
        - perl-interpreter
        - python3
        - python3-pip
        - libxcb-devel
        - libxkbcommon-devel
        - libxkbcommon-x11-devel
        - wayland-devel
        - mesa-libEGL-devel
        - xcb-util-devel
        - xcb-util-keysyms-devel
        - xcb-util-image-devel
        - xcb-util-wm-devel
        - rpm-build
        - rust
        - cargo
  - type: script
    snippets:
      # Build wezterm from main branch with CSI 2031 PR and package as RPM
      - "cd /tmp && git clone --depth 1 https://github.com/wez/wezterm.git wezterm-build"
      - "curl -fsSL https://github.com/wez/wezterm/pull/7723.diff -o /tmp/wezterm-csi-2031.patch"
      - "cd /tmp/wezterm-build && git apply /tmp/wezterm-csi-2031.patch"
      - "mkdir -p /tmp/wezterm-rpms && cd /tmp/wezterm-build && cargo build --release && bash ci/deploy.sh && cp /root/rpmbuild/RPMS/**/*.rpm /tmp/wezterm-rpms/"
      - "dnf install -y /tmp/wezterm-rpms/*.rpm"
      - "rm -rf /tmp/wezterm-rpms /tmp/wetzerm-build"
  - type: dnf
    remove:
      auto-remove: false
      packages:
        - fontconfig-devel
        - openssl-devel
        - openssl-devel-engine
        - libxcb-devel
        - libxkbcommon-devel
        - libxkbcommon-x11-devel
        - wayland-devel
        - mesa-libEGL-devel
        - xcb-util-devel
        - xcb-util-keysyms-devel
        - xcb-util-image-devel
        - xcb-util-wm-devel
        - rust
        - cargo
  - type: dnf
    repos:
      copr:
        - bigjapka/VeraCrypt
  - type: dnf
    install:
      packages:
        - "distrobox"
        - "flatpak-builder"
        - "foundry"
        - "libratbag-ratbagd"
        - "steam-devices"
        - "google-noto-sans-cjk-fonts"
        - "google-noto-serif-cjk-fonts"
        - "virt-manager"
        - "virt-viewer"
        - "vagrant"
        - "vagrant-libvirt"
        - "openrgb-udev-rules"
        - "i2c-tools"
        - "libi2c"
        - "libi2c-devel"
        - "veracrypt"
  - type: script
    snippets:
      - "update-desktop-database /usr/share/applications/"
      # Download PlatformIO udev rules so that PlatformIO can access USB devices
      - "curl -fsSL https://raw.githubusercontent.com/platformio/platformio-core/develop/platformio/assets/system/99-platformio-udev.rules -o /etc/udev/rules.d/99-platformio-udev.rules"
      # Download udev rules for OpenRGB
      - "curl -fsSL https://openrgb.org/releases/release_0.9/60-openrgb.rules -o /etc/udev/rules.d/60-openrgb.rules"
      # Add `disk` group to the system
      - "grep -E '^disk:' /usr/lib/group >> /etc/group"
      # ld alternatives
      - "ln -sf /usr/bin/ld.bfd /etc/alternatives/ld && ln -sf /etc/alternatives/ld /usr/bin/ld"
      - "ln -s '/usr/share/fonts/google-noto-sans-cjk-fonts' '/usr/share/fonts/noto-cjk'"
      - "sed -i 's/#AutomaticUpdatePolicy.*/AutomaticUpdatePolicy=stage/' /etc/rpm-ostreed.conf"
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - "org.mozilla.firefox"
          - "com.github.tchx84.Flatseal"
  - type: systemd
    system:
      disabled:
        - "bootc-fetch-apply-updates.timer"
