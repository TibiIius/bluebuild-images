---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json
modules:
  - from-file: common.yaml
  - type: files
    files:
      - source: workstation
        destination: /
  - type: dnf
    repos:
      copr:
        - bigjapka/VeraCrypt
  - type: dnf
    install:
      packages:
        - "distrobox"
        - "flatpak-builder"
        - "foundry"
        - "libratbag-ratbagd"
        - "steam-devices"
        - "google-noto-sans-cjk-fonts"
        - "google-noto-serif-cjk-fonts"
        - "virt-manager"
        - "virt-viewer"
        - "vagrant"
        - "vagrant-libvirt"
        - "openrgb-udev-rules"
        - "i2c-tools"
        - "libi2c"
        - "libi2c-devel"
        - "veracrypt"
  - type: akmods
    base: main
    install:
      - v4l2loopback
  - type: script
    snippets:
      - "update-desktop-database /usr/share/applications/"
  - type: script
    snippets:
      # Download PlatformIO udev rules so that PlatformIO can access USB devices
      - "curl -fsSL https://raw.githubusercontent.com/platformio/platformio-core/develop/platformio/assets/system/99-platformio-udev.rules -o /etc/udev/rules.d/99-platformio-udev.rules"
      # Download udev rules for OpenRGB
      - "curl -fsSL https://openrgb.org/releases/release_0.9/60-openrgb.rules -o /etc/udev/rules.d/60-openrgb.rules"
      # Add `disk` group to the system
      - "grep -E '^disk:' /usr/lib/group >> /etc/group"
      # ld alternatives
      - "ln -sf /usr/bin/ld.bfd /etc/alternatives/ld && ln -sf /etc/alternatives/ld /usr/bin/ld"
      - "ln -s '/usr/share/fonts/google-noto-sans-cjk-fonts' '/usr/share/fonts/noto-cjk'"
      - "sed -i 's/#AutomaticUpdatePolicy.*/AutomaticUpdatePolicy=stage/' /etc/rpm-ostreed.conf"
      # Install build dependencies for wezterm (including rust toolchain and rpmbuild)
      - "dnf install -y gtk3-devel wayland-devel mesa-libGL-devel libX11-devel sqlite-devel openssl-devel fontconfig-devel freetype-devel harfbuzz-devel libpng-devel libjpeg-turbo-devel pango-devel glib2-devel cmake pkg-config git libudev-devel alsa-lib-devel libayatana-appindicator-gtk3-devel python3 rust cargo rpm-build"
      # Build wezterm from main branch with CSI 2031 PR and package as RPM
      - "cd /tmp && git clone --depth 1 https://github.com/wez/wezterm.git wezterm-build 2>/dev/null || true"
      - "curl -fsSL https://github.com/wez/wezterm/pull/7723.diff -o /tmp/wezterm-csi-2031.patch"
      - "cd /tmp/wezterm-build && git apply /tmp/wezterm-csi-2031.patch"
      - "mkdir -p /tmp/wezterm-rpms && cd /tmp/wezterm-build && ./ci/deploy.sh . && cp *.rpm /tmp/wezterm-rpms/ 2>/dev/null || true"
      - "dnf install -y /tmp/wezterm-rpms/*.rpm || true"
      - "rm -rf /tmp/wezterm-rpms"
      # Remove build dependencies to keep image lean
      - "dnf remove -y cmake pkg-config git gtk3-devel wayland-devel mesa-libGL-devel libX11-devel sqlite-devel openssl-devel fontconfig-devel freetype-devel harfbuzz-devel libpng-devel libjpeg-turbo-devel pango-devel glib2-devel libudev-devel alsa-lib-devel libayatana-appindicator-gtk3-devel python3 rust cargo rpm-build"
      - "dnf autoremove -y"
      - "dnf clean all"
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - "org.mozilla.firefox"
          - "com.github.tchx84.Flatseal"
  - type: systemd
    system:
      disabled:
        - "bootc-fetch-apply-updates.timer"
